<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Home Intruder Detector{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <div class="logo-container">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 6c1.4 0 2.5 1.1 2.5 2.5S13.4 12 12 12s-2.5-1.1-2.5-2.5S10.6 7 12 7zm0 13c-2.7 0-5.15-1.68-6.13-4.14.03-.02.05-.04.08-.06.84-.53 2.58-1.3 4.25-1.3.31.25.7.4 1.13.4s.82-.15 1.13-.4c1.67 0 3.41.77 4.25 1.3.03.02.05.04.08.06C17.15 18.32 14.7 20 12 20z"/>
                </svg>
            </div>
            <div class="logo-text">AURA SHIELD</div>
        </div>
        
        <ul class="nav-links">
            <li class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <a href="{{ url_for('dashboard') }}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="9" rx="1"/>
                        <rect x="14" y="3" width="7" height="5" rx="1"/>
                        <rect x="14" y="12" width="7" height="9" rx="1"/>
                        <rect x="3" y="16" width="7" height="5" rx="1"/>
                    </svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item {% if active_page == 'database' %}active{% endif %}">
                <a href="{{ url_for('database') }}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Face Registry
                </a>
            </li>
            <li class="nav-item {% if active_page == 'logs' %}active{% endif %}">
                <a href="{{ url_for('logs') }}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    Activity Logs
                </a>
            </li>
            <li class="nav-item {% if active_page == 'messages' %}active{% endif %}">
                <a href="{{ url_for('messages_page') }}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    Dispatch Center
                </a>
            </li>
            <li class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <a href="{{ url_for('settings') }}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    System Settings
                </a>
            </li>
        </ul>
        
        <div class="sidebar-footer">
            B.Tech CSE Project<br>
            SR Group 65 &copy; 2026
        </div>
    </div>
    
    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Toast Notification Area -->
        <div id="toast-container" class="toast-container"></div>
        
        {% block content %}{% endblock %}
    </div>

    <!-- Global JS to handle SSE or live events for intruder popups -->
    <script>
        // Set up EventSource for real-time notification alerts
        const evtSource = new EventSource("{{ url_for('event_stream') }}");
        
        evtSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            if (data.type === "intruder_alert") {
                showIntruderToast(data);
                playWarningAlarm();
                // Dynamically update dashboard stats or alerts if on dashboard
                if (window.updateDashboardData) {
                    window.updateDashboardData(data);
                }
            }
        };

        function playWarningAlarm() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.25);
                osc.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 0.5);
                osc.frequency.linearRampToValueAtTime(900, audioCtx.currentTime + 0.75);
                osc.frequency.linearRampToValueAtTime(500, audioCtx.currentTime + 1.0);
                
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 1.2);
            } catch (e) {
                console.log("Warning audio blocked by browser autoplay policy:", e);
            }
        }

        function showIntruderToast(data) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div style="font-size: 1.5rem;">🚨</div>
                <div>
                    <strong style="display:block; font-size:1rem;">Intruder Detected!</strong>
                    <span style="font-size:0.8rem; opacity:0.9;">Unrecognized face detected at ${data.time}</span>
                </div>
            `;
            container.appendChild(toast);
            
            // Auto remove after 5 seconds
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) reverse';
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
